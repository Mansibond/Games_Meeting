<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <link rel="icon" href="media/logo.webp" type="image/png">
    <title>Games Meeting | Gestor de biblioteca gamer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="auth-screen">
    <div class="login-card">
        <img src="media/logo.webp" alt="Logo" class="login-logo-img">
        <h2 id="auth-title" style="color: var(--sidebar); margin-top: 0;">Iniciar sesión</h2>

        <input type="text" id="auth-name" class="login-input" placeholder="Tu nombre" style="display:none;">
        <input type="email" id="auth-email" class="login-input" placeholder="Correo electrónico">
        <input type="password" id="auth-pass" class="login-input" placeholder="Contraseña">

        <button id="btn-auth" class="btn-login" onclick="login()">ENTRAR</button>
        <p id="auth-error" style="color: red; font-size: 0.9rem; margin-top: 10px;"></p>
        <div class="toggle-link" id="toggle-auth" onclick="toggleAuth()">¿No tienes cuenta? Regístrate aquí</div>
    </div>
</div>

<div id="app-screen">
    <div class="app-container">
        <div class="sidebar">
            <div class="logo">
                <img src="media/logo.webp" style="width: 50px;" alt="Icon">
                <div class="logo-text">Games Meeting</div>
            </div>
            <div class="menu-item active" onclick="cargarJuegos()"><span class="icon">📚</span> <span class="text">Mi biblioteca</span>
            </div>
            <div class="menu-item" onclick="abrirFiltros()"><span class="icon">🔍</span> <span
                    class="text">Filtrar...</span></div>
            <div class="menu-item" onclick="abrirModal()"><span class="icon">➕</span> <span
                    class="text">Añadir juego</span></div>
            <div class="menu-item btn-logout" onclick="logout()"><span class="icon">🚪</span> <span class="text">Cerrar sesión</span>
            </div>
            <div class="footer-info">&copy; 2026 Adrián Mansilla <br>Proyecto Intermodular</div>
        </div>

        <div class="main-content">
            <div class="header">
                <h1>Mi colección gamer</h1>
                <div class="header-right">
                    <span id="user-name-display"
                          style="margin-right: 15px; color: var(--sidebar); font-weight: bold;"></span>
                </div>
            </div>
            <div id="games-grid" class="games-grid"></div>
        </div>
    </div>
</div>

<div id="modal-form" class="modal-overlay">
    <div class="modal">
        <h2>Gestionar juego</h2>
        <input type="hidden" id="id-juego">
        <div class="form-grid">
            <div class="form-group"><label>Título</label><input type="text" id="titulo"></div>
            <div class="form-group"><label>Año</label><input type="number" id="anio"></div>
            <div class="form-group"><label>Estado</label><select id="estado"></select></div>
            <div class="form-group"><label>Género</label><select id="genero"></select></div>
            <div class="form-group"><label>Formato</label><select id="formato"></select></div>
            <div class="form-group"><label>Plataforma</label><select id="plataforma"></select></div>
            <div class="form-group">
                <label>Puntuación</label>
                <select id="puntuacion">
                    <option value="">Sin puntuar</option>
                    <option value="1">1 Estrella - Malo</option>
                    <option value="2">2 Estrellas - Regular</option>
                    <option value="3">3 Estrellas - Bueno</option>
                    <option value="4">4 Estrellas - Muy Bueno</option>
                    <option value="5">5 Estrellas - Obra Maestra</option>
                </select>
            </div>
            <div class="form-group form-full"><label>Carátula (URL)</label><input type="text" id="caratula"></div>
            <div class="form-group form-full"><label>Descripción</label><textarea id="descripcion"></textarea></div>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
            <button class="btn-cancel" onclick="cerrarModal('modal-form')">Cancelar</button>
            <button class="btn-primary" onclick="guardarJuego()">Guardar</button>
        </div>
    </div>
</div>

    <div id="modal-delete" class="modal-overlay">
        <div class="modal" style="text-align:center; max-width:400px;">
            <h2 style="color: var(--delete)">Eliminar</h2>
            <p>¿Seguro? No habrá vuelta atrás.</p>
            <input type="hidden" id="id-borrar">
            <div style="display:flex; justify-content:center; gap:10px;">
                <button class="btn-cancel" onclick="cerrarModal('modal-delete')">Cancelar</button>
                <button class="btn-primary" style="background:var(--delete)" onclick="confirmarBorrado()">Eliminar
                </button>
            </div>
        </div>
    </div>

    <div id="modal-filtros" class="modal-overlay">
        <div class="modal" style="max-width:350px;">
            <h2>Filtrar</h2>
            <div class="form-group"><label>Nombre</label><input type="text" id="filtro-txt" onkeyup="aplicarFiltros()">
            </div>
            <div class="form-group"><label>Género</label><select id="filtro-gen" onchange="aplicarFiltros()">
                <option value="">Todos</option>
            </select></div>
            <div class="form-group"><label>Plataforma</label><select id="filtro-plat" onchange="aplicarFiltros()">
                <option value="">Todas</option>
            </select></div>
            <div class="form-group"><label>Estado</label><select id="filtro-est" onchange="aplicarFiltros()">
                <option value="">Todos</option>
            </select></div>
            <button class="btn-primary" style="width:100%; margin-top:20px;" onclick="cerrarModal('modal-filtros')">
                Cerrar
            </button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
